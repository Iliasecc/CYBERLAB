<!DOCTYPE html> 
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="idle/lib/codemirror.css">
    <link rel="stylesheet" href="idle/theme/dracula.css">
    
    <script src="idle/lib/codemirror.js"></script>
    <script src="idle/mode/python/python.js"></script>
    <script src="idle/addon/edit/closebrackets.js"></script>
    
    <!-- Inclure Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
    <!-- Inclure Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/js/bootstrap.min.js" integrity="sha384-oesi62hOLfzrys4LxRF63OJCXdXDipiYWBnvTl9Y9/TRlw5xlKIEHpNyvvDShgf/" crossorigin="anonymous"></script>
    
    <!-- Inclure votre fichier de style -->
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Modification de la couleur de fond de la zone de texte */
        .cm-s-dracula.CodeMirror {
            background-color: #000000 !important;
            border: none; 
        }
    </style>
</head>

<body>
    <!-- Header -->
    <nav>
        <div class="logo" style="display: flex; align-items: center;">
            <img src="image/cyberlog.jpg" alt="Logo" class="logo-image">
            <span style="color: #feffff; font-size: 25px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; font-family: 'Arial', sans-serif; text-shadow: 5px 5px 8px rgba(0, 0, 0, 0.5); transform: skewX(-5deg);">CYBERLAB</span>
        </div>
        
        
        <div class="hamburger">
            <div class="line1"></div>
            <div class="line2"></div>
            <div class="line3"></div>
        </div>
        <ul class="nav-links">
            <li><a href="#" onclick="goToDashboard()">Accueil 🏠</a></li>
            <li><a href="#" onclick="viewProfile()">Profil 👤</a></li>
            <li><a href="c:\Users\Lenovo\Downloads\NORD DU MAROC.pdf" download="resultats.pdf">Télécharger Résultats 📊</a></li>
            <li><a href="#" onclick="submitReportBtn()">Déposer Compte Rendu 📝</a></li>
            <li><a href="#" onclick="logout()">Se Déconnecter 🚪</a></li>
            <li>   
                <select class="form-select" id="experiences" onchange="changeExperience()">
                    <option value="exp1">Travail Pratique 1 🧪</option>
                    <option value="exp2">Travail Pratique 2 🧪</option>
                    <option value="exp2">Travail Pratique 3 🧪</option>
                    <option value="exp2">Travail Pratique 4 🧪</option>
                    <option value="exp2">Travail Pratique 5 🧪</option>
                    <option value="exp2">Travail Pratique 6 🧪</option>
                </select>
            </li>
        </ul>    
    </nav>
<!-- Main Content -->
<main class="container-fluid">
    <div class="row">
        <div class="col-lg-6">
            <!-- Simulation Section -->
            <section class="simulation-section">
                <div class="section-label">Simulation</div>
                <button id="codeButton" onclick="toggleCodeSection()">Coder<i class="bi bi-code"></i>
                </button>
                
    
                <!-- Zone de code initialement cachée -->

                <div id="liveResults">
                    <!-- Video YouTube -->
                    <iframe width="100%" height="250" src="https://www.youtube.com/embed/VIDEO_ID" frameborder="0" allowfullscreen></iframe>
                 
                    <!-- Images -->
                <div class="image-gallery">
                    <div class="image-item" onclick="openImageModal('image/tp1.jpg')">
                        <div class="image-label">Image 1</div>
                        <div class="image-icon" role="img" aria-label="Image">&#128366;</div>    
                    </div>
                    <div class="image-item" onclick="openImageModal('c:\Users\Lenovo\Pictures\image poo.png')">
                        <div class="image-label">Image 2</div>
                        <div class="image-icon" role="img" aria-label="Image">&#128366;</div>    
                    </div>
                    <!-- Ajoutez plus d'images avec leurs miniatures -->
                </div>

                <!-- Overlay pour afficher l'image agrandie -->
                <div id="image-overlay" class="overlay" onclick="closeImageModal()">
                    <div id="modal-content">
                        <img id="modal-image" src="" alt="Modal Image">
                    </div>
                </div>


                </div>
            </section>
        
            
        </div>
        
        
        <div class="col-lg-6">
            <!-- Video Section -->
            <section class="video-section">
                <!-- Zone de code initialement cachée -->
                <div id="codeSection" style="display: none;">
                    <div class="row m-3">
                        <div class="col">
                            <div class="d-flex d-flex-styles"> <!-- Utilisation de la nouvelle classe -->
                                <div class="col-6 col-styles"> <!-- Utilisation de la nouvelle classe -->
                                    <!-- Option Python seulement -->
                                    <label class="visually-hidden" for="inlineFormSelectPrefPython">Language</label>
                                    <select class="form-select" id="inlineFormSelectPrefPython">
                                        <option value="Python" selected>Python</option>
                                    </select>
                                </div>
                                <div>
                                    <button type="button" id="runPython" class="btn btn-success"><i class="bi bi-play-fill"></i>Excécuter</button>
                                </div>
                            </div>
                
                            <!-- Utiliser CodeMirror pour la nouvelle zone de texte -->
                            <textarea id="pythonEditor" class="form-control" aria-label="Python Code" placeholder="Écrire du code Python ici..."></textarea>
                        </div>
                        
                        
                        
                    </div>
                </div>
                <button class="btn btn-primary1" onclick="startLiveVideo()">Lancer le retour en direct ▶️</button>
                    <i class="fas fa-expand"></i> 
                </button>
                <div class="video-container">
                    <video id="liveVideo" width="100%" height="200" autoplay playsinline></video>
                </div>
            </section>
        </div>

        <div class="row mt-3">
            <div class="col-lg-6">
                <!-- Results Section -->
                <section class="results-section">
                    <div class="section-label">Résultats</div>
                    <button class="btn btn-primary" onclick="toggleFullScreen('results-section')">
                        &#128162;
                    </button>
                    <div id="liveResults">
                        <iframe id="resultsFrame" width="100%" height="200" src="" frameborder="0" allowfullscreen></iframe>
                    </div>
                </section>
            </div>
        </div>
    </div>
</main>


<script src="script.js"></script>

</body>

</html>
