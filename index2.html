<!-- Main Content -->
<main class="container-fluid">
    <div class="row">
        <div class="col-lg-6">
            <!-- Simulation Section -->
            <section class="simulation-section">
                <div class="section-label">Simulation</div>
                <button class="btn btn-primary" onclick="toggleFullScreen('simulation-section')">
                    <i class="fas fa-expand"></i> 
                </button>
                <div id="liveResults">
                    <iframe id="simulationFrame" width="100%" height="250" src="" frameborder="0" allowfullscreen></iframe>
                </div>
            </section>
        </div>
        <div class="col-lg-6">
            <!-- Video Section -->
            <section class="video-section">
                <div class="section-label">Vidéo</div>
                <button class="btn btn-primary1" onclick="startLiveVideo()">Lancer le retour en direct ▶️</button>
                <button class="btn btn-primary" onclick="toggleFullScreen('video-section')">
                    <i class="fas fa-expand"></i> 
                </button>
                <div class="video-container">
                    <video id="liveVideo" width="100%" height="200" autoplay playsinline></video>
                </div>

        </div>

        <div class="row mt-3">
            <div class="col-lg-6">
                <!-- Results Section -->
                <section class="results-section">
                    <div class="section-label">Résultats</div>
                    <button class="btn btn-primary" onclick="toggleFullScreen('results-section')">
                        <i class="fas fa-expand"></i> 
                    </button>
                    <div id="liveResults">
                        <iframe id="resultsFrame" width="100%" height="260" src="" frameborder="0" allowfullscreen></iframe>
                    </div>
                </section>
            </div>
        </div>     
    </div>
    
</main>
